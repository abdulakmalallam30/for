<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iqra - I Love You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 20%, #2d2f5f 50%, #1a1f3a 80%, #0a0e27 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .night-sky {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            overflow: hidden;
        }

        /* Moon */
        .moon {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #ffffcc 20%, #ffeb99 40%, #f0e68c 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.6),
                        0 0 100px rgba(255, 239, 213, 0.4),
                        inset -10px -10px 30px rgba(0, 0, 0, 0.3);
            animation: moonGlow 4s ease-in-out infinite;
            z-index: 5;
        }

        /* Moon craters */
        .moon::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            top: 30px;
            left: 35px;
            box-shadow: 40px 20px 15px rgba(0, 0, 0, 0.15),
                        25px 50px 20px rgba(0, 0, 0, 0.1),
                        60px 60px 15px rgba(0, 0, 0, 0.12);
        }

        /* Moon light glow */
        .moon::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            top: -25%;
            left: -25%;
            border-radius: 50%;
        }

        @keyframes moonGlow {
            0%, 100% {
                box-shadow: 0 0 60px rgba(255, 255, 255, 0.6),
                            0 0 100px rgba(255, 239, 213, 0.4),
                            inset -10px -10px 30px rgba(0, 0, 0, 0.3);
                transform: translateX(-50%) scale(1);
            }
            50% {
                box-shadow: 0 0 80px rgba(255, 255, 255, 0.8),
                            0 0 130px rgba(255, 239, 213, 0.6),
                            inset -10px -10px 30px rgba(0, 0, 0, 0.3);
                transform: translateX(-50%) scale(1.05);
            }
        }

        /* Stars */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
            box-shadow: 0 0 3px rgba(255, 255, 255, 0.8);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* Shooting stars */
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            animation: shootingStar 3s ease-in infinite;
        }

        @keyframes shootingStar {
            0% {
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(300px, -300px);
            }
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            opacity: 0.3;
        }

        .cloud-1 {
            width: 200px;
            height: 50px;
            top: 15%;
            left: -200px;
            animation: floatCloud 30s linear infinite;
        }

        .cloud-2 {
            width: 150px;
            height: 40px;
            top: 30%;
            right: -150px;
            animation: floatCloudReverse 40s linear infinite;
        }

        .cloud-3 {
            width: 180px;
            height: 45px;
            top: 50%;
            left: -180px;
            animation: floatCloud 35s linear infinite;
        }

        @keyframes floatCloud {
            0% { transform: translateX(0); }
            100% { transform: translateX(120vw); }
        }

        @keyframes floatCloudReverse {
            0% { transform: translateX(0); }
            100% { transform: translateX(-120vw); }
        }

        /* Main Container */
        .entrance-container {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 850px;
            padding: 80px 60px;
            backdrop-filter: none;
            background: transparent;
            border-radius: 60px;
            border: none;
            box-shadow: none;
            animation: entranceFloat 2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        @keyframes entranceFloat {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.85);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #f5e6d3 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            animation: titleFadeIn 1.4s ease-out, textGlow 6s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255, 220, 150, 0.2);
            filter: drop-shadow(0 0 30px rgba(255, 200, 100, 0.15)) drop-shadow(0 0 50px rgba(0, 0, 0, 0.8));
            word-spacing: 10px;
        }

        @keyframes textGlow {
            0%, 100% {
                filter: drop-shadow(0 0 30px rgba(255, 200, 100, 0.15));
            }
            50% {
                filter: drop-shadow(0 0 50px rgba(255, 180, 100, 0.25));
            }
        }

        @keyframes titleFadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 235, 210, 0.85);
            margin: 15px 0 30px 0;
            font-weight: 400;
            animation: subtitleFadeIn 1.6s ease-out 0.2s both;
            line-height: 1.6;
            letter-spacing: 1px;
            text-shadow: 0 2px 20px rgba(255, 180, 100, 0.2), 0 0 30px rgba(0, 0, 0, 0.9);
        }

        @keyframes subtitleFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .moon-emoji {
            font-size: 80px;
            margin: 20px 0 30px 0;
            animation: moonEmojiFloat 4s ease-in-out infinite, pulseEmojiGlow 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 200, 100, 0.3));
            text-shadow: 0 0 40px rgba(255, 150, 150, 0.25);
        }

        @keyframes moonEmojiFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.08); }
        }

        @keyframes pulseEmojiGlow {
            0%, 100% {
                filter: drop-shadow(0 0 30px rgba(255, 200, 100, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 60px rgba(255, 150, 100, 0.5));
            }
        }

        .enter-button {
            margin-top: 30px;
            padding: 15px 70px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #1a1f3a;
            background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 50%, #ffffff 100%);
            border: 1px solid rgba(255, 220, 150, 0.4);
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 15px 50px rgba(255, 180, 100, 0.25),
                        0 0 30px rgba(255, 220, 150, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
            animation: buttonFadeIn 1.8s ease-out 0.4s both, buttonPulse 3s ease-in-out infinite 2.8s;
        }

        @keyframes buttonPulse {
            0%, 100% {
                box-shadow: 0 15px 50px rgba(255, 180, 100, 0.25),
                            0 0 30px rgba(255, 220, 150, 0.15),
                            inset 0 1px 0 rgba(255, 255, 255, 0.6);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 20px 60px rgba(255, 150, 80, 0.4),
                            0 0 50px rgba(255, 200, 100, 0.25),
                            inset 0 1px 0 rgba(255, 255, 255, 0.8);
                transform: scale(1.01);
            }
        }

        @keyframes buttonFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .enter-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            transition: left 0.8s ease;
            z-index: 1;
        }

        .enter-button:hover::before {
            left: 100%;
        }

        .enter-button:hover {
            transform: translateY(-8px) scale(1.04);
            box-shadow: 0 25px 70px rgba(255, 150, 80, 0.4),
                        0 0 60px rgba(255, 200, 100, 0.3);
            background: linear-gradient(135deg, #ffffff 0%, #fafafa 50%, #ffffff 100%);
            border-color: rgba(255, 200, 120, 0.6);
        }

        .enter-button:active {
            transform: translateY(-4px) scale(0.99);
        }

        .welcome-text {
            font-size: 1rem;
            color: rgba(255, 245, 230, 0.9);
            margin-top: 30px;
            font-weight: 400;
            animation: welcomeFadeIn 2s ease-out 0.8s both;
            line-height: 1.6;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 20px rgba(255, 180, 100, 0.15), 0 0 40px rgba(0, 0, 0, 0.95);
        }

        @keyframes welcomeFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sparkle-accent {
            display: inline-block;
            animation: sparkleGlow 2.5s ease-in-out infinite;
            background: linear-gradient(135deg, rgba(255, 220, 120, 0.2), rgba(255, 180, 120, 0.2));
            padding: 8px 20px;
            border-radius: 30px;
            color: #ffe8d6;
            font-weight: 500;
        }

        @keyframes sparkleGlow {
            0%, 100% { 
                opacity: 0.8;
                background: linear-gradient(135deg, rgba(255, 220, 120, 0.15), rgba(255, 180, 120, 0.15));
            }
            50% { 
                opacity: 1;
                background: linear-gradient(135deg, rgba(255, 220, 120, 0.3), rgba(255, 180, 120, 0.3));
            }
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');

        /* Rain effect */
        .rain {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 3;
            overflow: hidden;
            pointer-events: none;
        }

        .raindrop {
            position: absolute;
            bottom: -10px;
            width: 1px;
            height: 10px;
            background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.6));
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(0);
                opacity: 0.8;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 5;
        }

        .particle::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 200, 100, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 200, 100, 0.4);
        }
    </style>
</head>
<body>
    <!-- Night Sky -->
    <div class="night-sky">
        <div class="moon"></div>
        <div class="stars" id="stars"></div>
        <div class="rain" id="rain"></div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>

    <!-- Main Content -->
    <div class="entrance-container">
        <h2 class="title">Iqra...</h2>
        
        <div class="subtitle">
            I have something important to tell you.
        </div>

        <div class="welcome-text">
            I love you more than words can express,
            <br>
            and I want to spend my whole life with you.
        </div>

        <button class="enter-button" onclick="enterPage()">
            Continue
        </button>
    </div>

    <script>
        // Create stars in night sky
        function createStars() {
            const starsContainer = document.getElementById('stars');
            
            // Regular twinkling stars
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 70 + '%';
                star.style.animation = `twinkle ${2 + Math.random() * 4}s infinite`;
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }

            // Occasional shooting stars
            setInterval(() => {
                if (Math.random() > 0.8) {
                    createShootingStar();
                }
            }, 3000);
        }

        // Create shooting star
        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 50 + '%';
            star.style.animationDuration = (2 + Math.random() * 2) + 's';
            const starsContainer = document.getElementById('stars');
            starsContainer.appendChild(star);
            
            setTimeout(() => star.remove(), 4000);
        }

        // Navigate to apology page
        function enterPage() {
            const button = event.target;
            button.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                window.location.href = 'apology.html';
            }, 200);
        }

        // Create floating particles
        function createFloatingParticles() {
            setInterval(() => {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = '0';
                particle.style.animation = `floatUp ${5 + Math.random() * 3}s ease-in forwards`;
                document.body.appendChild(particle);
                
                setTimeout(() => particle.remove(), 8000);
            }, 500);
        }

        // Create rain effect
        function createRain() {
            const rainContainer = document.getElementById('rain');
            setInterval(() => {
                const raindrop = document.createElement('div');
                raindrop.className = 'raindrop';
                raindrop.style.left = Math.random() * 100 + '%';
                raindrop.style.animationDuration = (2 + Math.random() * 3) + 's';
                raindrop.style.animationDelay = Math.random() * 0.5 + 's';
                rainContainer.appendChild(raindrop);
                
                setTimeout(() => raindrop.remove(), 5000);
            }, 100);
        }

        // Add floatUp animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatUp {
                to {
                    transform: translateY(100vh) translateX(100px);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize
        createStars();
        createFloatingParticles();
        createRain();

        // Add smooth scroll behavior
        document.documentElement.style.scrollBehavior = 'smooth';
    </script>
</body>
</html>
